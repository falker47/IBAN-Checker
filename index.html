<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <!-- Favicons -->
  <link href="favicon.png" rel="icon" />
  <link href="favicon.png" rel="apple-touch-icon" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    crossorigin="anonymous" referrerpolicy="no-referrer" />

  <!-- Anteprima Immagine -->
  <meta property="og:image" content="iban-checker.webp" />
  <meta name="twitter:image" content="iban-checker.webp" />
  <meta name="description"
    content="Valida IBAN italiani in tempo reale con verifica CIN, Mod.97 e lookup banca/filiale." />

  <title>IBAN Checker</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body class="min-h-screen flex flex-col items-center justify-center p-3 sm:p-4 md:p-6">
  <div class="relative w-full max-w-[95vw] sm:max-w-xl md:max-w-2xl lg:max-w-3xl">
    <!-- Glassmorphism Container -->
    <div
      class="bg-white/[0.82] backdrop-blur-xl border border-white/70 shadow-premium rounded-2xl sm:rounded-3xl p-5 sm:p-8 md:p-10 lg:p-12 relative z-10 w-full">
      <!-- Header -->
      <div class="text-center mb-8 sm:mb-10 md:mb-12">
        <h1 class="text-2xl sm:text-3xl md:text-4xl font-extrabold gradient-title mb-2 sm:mb-3 md:mb-4 tracking-tight">
          IBAN Checker
        </h1>
        <p class="text-slate-500 text-sm sm:text-base md:text-lg">
          Verifica la validità e i dettagli del tuo IBAN.
        </p>
      </div>

      <!-- Input Section -->
      <div class="mb-6 sm:mb-8 md:mb-10">
        <label for="ibanInput" class="block text-xs sm:text-sm font-semibold text-slate-600 mb-2 sm:mb-2.5 ml-1">Codice
          IBAN</label>
        <div class="relative flex items-center">
          <input type="text" id="ibanInput"
            class="w-full px-3 py-3 sm:px-4 sm:py-3.5 md:px-5 md:py-4 text-sm sm:text-base md:text-lg bg-white border-2 border-slate-200 rounded-xl sm:rounded-2xl focus:outline-none focus:ring-4 focus:ring-indigo-200 focus:border-indigo-400 transition-all shadow-sm placeholder-slate-300 pr-12"
            placeholder="IT47X0123456789000000123456" autocomplete="on" autocapitalize="characters"
            spellcheck="false" />

          <button id="pasteBtn"
            class="absolute right-2 top-1/2 -translate-y-1/2 p-1.5 sm:p-2 text-accent-primary hover:text-accent-primary-hover hover:bg-indigo-50 rounded-lg transition-colors"
            title="Incolla dagli Appunti" aria-label="Incolla dagli Appunti">
            <svg width="20" height="20" class="sm:w-6 sm:h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M16 4H8a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z" />
              <rect x="9" y="2" width="6" height="4" rx="1" ry="1" />
            </svg>
          </button>
        </div>
      </div>

      <!-- Button removed: validation is now automatic while typing -->

      <!-- Indicators -->
      <div id="indicators"
        class="flex flex-wrap justify-center gap-2 sm:gap-2.5 md:gap-3 mt-6 sm:mt-8 md:mt-10 empty:hidden"></div>

      <!-- Result Box -->
      <div id="result"
        class="mt-6 sm:mt-8 md:mt-10 hidden opacity-0 transition-all duration-500 transform translate-y-4" style="transition-timing-function: cubic-bezier(0.16, 1, 0.3, 1)">
        <!-- Content injected by JS -->
      </div>

      <!-- Info Text -->
      <div class="mt-10 sm:mt-12 md:mt-14 pt-6 sm:pt-8 md:pt-8 border-t border-black/[0.06] text-center">
        <p class="text-xs sm:text-sm text-slate-400 leading-relaxed max-w-lg mx-auto px-2">
          Questo strumento analizza la struttura matematica dell'IBAN e, in
          caso di errore, suggerisce possibili correzioni basate su errori di
          digitazione comuni.
        </p>
      </div>
    </div>

    <!-- Decorative geometric shapes - hidden on small screens -->
    <div class="hidden sm:block geo-shape rounded-full w-56 md:w-72 h-56 md:h-72 border-2 border-violet-500/[0.12]" style="top:-60px;right:-40px;transform:rotate(15deg)"></div>
    <div class="hidden sm:block geo-shape rounded-3xl w-44 md:w-52 h-44 md:h-52 border-2 border-sky-500/10" style="bottom:80px;left:-60px;transform:rotate(35deg)"></div>
    <div class="hidden sm:block geo-shape rounded-full w-28 md:w-32 h-28 md:h-32 bg-violet-500/[0.04]" style="top:30%;right:10%"></div>
    <div class="hidden sm:block geo-shape rounded-2xl w-36 md:w-44 h-36 md:h-44 border-[1.5px] border-pink-500/[0.08]" style="bottom:-30px;right:20%;transform:rotate(20deg)"></div>
    <div class="hidden sm:block geo-shape rounded-xl w-20 md:w-24 h-20 md:h-24 bg-sky-500/[0.04]" style="top:15%;left:8%;transform:rotate(45deg)"></div>
    <div class="hidden sm:block geo-shape w-14 md:w-16 h-14 md:h-16 border-[1.5px] border-indigo-500/10" style="bottom:20%;left:15%;transform:rotate(60deg)"></div>
  </div>

  <footer class="mt-8 sm:mt-10 md:mt-14 text-center text-slate-400 text-xs sm:text-sm">
    <p>
      <a href="https://falker47.github.io/Nexus-portfolio/" target="_blank"
        class="hover:text-indigo-500 transition-colors">
        &copy; <span id="currentYear"></span> Maurizio Falconi - falker47
      </a>
    </p>
  </footer>

  <script type="module" src="js/main.js"></script>
</body>

</html>
